name: CI/CD

on:
  push:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint backend
        working-directory: backend
        run: |
          npm install
          npm run lint --if-present

      - name: Lint frontend
        working-directory: frontend
        run: |
          npm install
          npm run lint --if-present

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        # short commit sha as the tag, so every build is uniquely
        # identifiable and rollbacks in argo cd are just "pick an older
        # commit in the infra repo history"
        run: echo "tag=$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/taskflow-backend:${{ steps.vars.outputs.tag }}
            ${{ env.DOCKERHUB_USERNAME }}/taskflow-backend:latest

      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/taskflow-worker:${{ steps.vars.outputs.tag }}
            ${{ env.DOCKERHUB_USERNAME }}/taskflow-worker:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/taskflow-frontend:${{ steps.vars.outputs.tag }}
            ${{ env.DOCKERHUB_USERNAME }}/taskflow-frontend:latest

  update-infra-repo:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: yourusername/taskflow-infra
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra

      - name: Update image tags
        working-directory: infra/k8s
        env:
          TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          sed -i "s#\(image: .*taskflow-backend\):.*#\1:${TAG}#"  05-backend.yaml
          sed -i "s#\(image: .*taskflow-worker\):.*#\1:${TAG}#"   06-worker.yaml
          sed -i "s#\(image: .*taskflow-frontend\):.*#\1:${TAG}#" 08-frontend.yaml

      - name: Commit and push
        working-directory: infra
        run: |
          git config user.name "taskflow-ci-bot"
          git config user.email "ci-bot@taskflow.dev"
          git add k8s/*.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: bump image tags to ${{ needs.build-and-push.outputs.image_tag }}"
          git push
