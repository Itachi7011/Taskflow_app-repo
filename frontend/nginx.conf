# nginx.conf
# serves the built vite app and forwards /api straight to the backend
# k8s service, this is the production equivalent of vite's dev proxy

server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # gzip the usual suspects, no point serving raw json/js uncompressed
  gzip on;
  gzip_types text/plain text/css application/javascript application/json;

  location /api/ {
    proxy_pass http://taskflow-backend:5000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback - any route react-router owns should still load index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
